<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Siege | Top-Down Survival Shooter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script type="module" src="{{ url_for('static', filename='script.js') }}"></script>
</head>

<body class="game-page">
    <main class="game-shell" aria-label="Iron Siege game area">
        <canvas id="gameCanvas" width="1280" height="768">
            Your browser does not support the HTML5 canvas element.
        </canvas>

        <section class="game-actions" aria-live="polite">
            <p id="outcome" class="show"></p>
            <a id="again" class="show" href="{{ url_for('play') }}"></a>
            <a id="home" class="show" href="{{ url_for('index') }}"></a>
        </section>
    </main>
</body>

</html>
